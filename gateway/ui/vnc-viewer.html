<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consola VNC — PUCP Cloud</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0f;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #13131a;
      border-bottom: 1px solid #2a2a3a;
      flex-shrink: 0;
      gap: 12px;
    }
    #topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.82rem;
      color: #94a3b8;
    }
    #topbar-left strong { color: #5eead4; font-size: 0.9rem; }
    #status {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #2a2a3a;
    }
    #status.connected { background: #052e16; color: #4ade80; border-color: #166534; }
    #status.error     { background: #2d0a0a; color: #f87171; border-color: #7f1d1d; }
    #topbar-right { display: flex; gap: 8px; }
    button {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #2d3748; }
    button.danger { border-color: #7f1d1d; color: #f87171; }
    button.danger:hover { background: #2d0a0a; }
    #canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
      position: relative;
    }
    #loading {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      color: #64748b;
      font-size: 0.85rem;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #1e293b;
      border-top-color: #5eead4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-box {
      display: none;
      position: absolute;
      background: #13131a;
      border: 1px solid #7f1d1d;
      border-radius: 10px;
      padding: 24px 32px;
      text-align: center;
      max-width: 400px;
    }
    #error-box h3 { color: #f87171; margin-bottom: 8px; }
    #error-box p  { color: #94a3b8; font-size: 0.82rem; line-height: 1.5; }
  </style>
</head>
<body>

<div id="topbar">
  <div id="topbar-left">
    <strong id="vm-label">Consola VNC</strong>
    <span id="worker-label"></span>
  </div>
  <span id="status">Conectando…</span>
  <div id="topbar-right">
    <button onclick="toggleFullscreen()">⛶ Pantalla completa</button>
    <button class="danger" onclick="window.close()">✕ Cerrar</button>
  </div>
</div>

<div id="canvas-wrap">
  <div id="loading">
    <div class="spinner"></div>
    <span>Conectando a la VM…</span>
  </div>
  <div id="error-box">
    <h3>No se pudo conectar</h3>
    <p id="error-msg">Error desconocido. Verifica que la VM esté en estado Running y vuelve a intentarlo.</p>
  </div>
</div>

<!-- noVNC desde CDN (jsDelivr) -->
<script type="module">
  import RFB from "https://cdn.jsdelivr.net/npm/@novnc/novnc@1.4.0/core/rfb.js";

  const params  = new URLSearchParams(window.location.search);
  const worker  = params.get("worker") || "";
  const port    = params.get("port")   || "";
  const token   = params.get("token")  || "";
  const vmName  = params.get("vm")     || "VM";

  document.getElementById("vm-label").textContent = `Consola — ${vmName}`;
  document.getElementById("worker-label").textContent = `Worker: ${worker} · Puerto VNC: ${port}`;

  const proto  = location.protocol === "https:" ? "wss" : "ws";
  const wsUrl  = `${proto}://${location.host}/ws/vnc-proxy?worker=${encodeURIComponent(worker)}&port=${encodeURIComponent(port)}&token=${encodeURIComponent(token)}`;

  const wrap   = document.getElementById("canvas-wrap");
  const status = document.getElementById("status");
  const loading = document.getElementById("loading");
  const errBox  = document.getElementById("error-box");
  const errMsg  = document.getElementById("error-msg");

  let rfb;
  try {
    rfb = new RFB(wrap, wsUrl, { wsProtocols: ["binary"] });

    rfb.scaleViewport = true;
    rfb.resizeSession = false;

    rfb.addEventListener("connect", () => {
      loading.style.display = "none";
      status.textContent    = "Conectado";
      status.className      = "connected";
    });

    rfb.addEventListener("disconnect", (e) => {
      status.textContent = "Desconectado";
      status.className   = "error";
      if (!e.detail.clean) {
        loading.style.display = "none";
        errBox.style.display  = "block";
        errMsg.textContent    = "La conexión se cerró inesperadamente. Verifica que la VM esté en estado Running.";
      }
    });

    rfb.addEventListener("securityfailure", (e) => {
      loading.style.display = "none";
      errBox.style.display  = "block";
      errMsg.textContent    = `Error de autenticación VNC: ${e.detail.reason || "credenciales incorrectas"}`;
      status.className = "error";
    });

  } catch (err) {
    loading.style.display = "none";
    errBox.style.display  = "block";
    errMsg.textContent    = `Error inicializando el visor: ${err.message}`;
    status.className = "error";
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      wrap.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  }
  window.toggleFullscreen = toggleFullscreen;
</script>

</body>
</html>
