global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Reglas de alerta
rule_files:
  - "/etc/prometheus/alerts.yml"

# Alertmanager (descomenta cuando lo levantes)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: node_exporter_headnode
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          node: server4-headnode
    relabel_configs:
      - source_labels: [node]
        target_label: nodename

  - job_name: node_exporter_workers
    static_configs:
      - targets: ['10.0.10.1:9100']
        labels:
          node: server1
      - targets: ['10.0.10.2:9100']
        labels:
          node: server2
      - targets: ['10.0.10.3:9100']
        labels:
          node: server3
    relabel_configs:
      - source_labels: [node]
        target_label: nodename

  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']
        labels:
          node: prometheus