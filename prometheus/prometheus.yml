# ============================================================================
# prometheus.yml — Configuración de scraping para PUCP Cloud Orchestrator
#
# Cada worker (Linux y OpenStack) es alcanzado vía un túnel SSH local
# (ver scripts/start_monitoring_tunnels.sh) que reenvía el puerto 9100
# (node_exporter) del worker hacia localhost:<puerto_local> en el host
# `app`. Prometheus corre en un contenedor con --network=host (ver
# docker-compose.yml) para poder alcanzar esos puertos locales.
#
# El relabel_config reescribe la etiqueta "instance" (que de otra forma
# sería "localhost:9101", sin significado) a un nombre legible que
# coincide exactamente con lo que slice_manager/app/main.py espera en
# monitoring_summary(): server1, server2, server3, worker1, worker2,
# worker3.
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ─── Cluster Linux ──────────────────────────────────────────────────────
  - job_name: "node_exporter_linux"
    static_configs:
      - targets: ["localhost:9101"]
        labels: { node: "server1" }
      - targets: ["localhost:9102"]
        labels: { node: "server2" }
      - targets: ["localhost:9103"]
        labels: { node: "server3" }

  # ─── Cluster OpenStack ──────────────────────────────────────────────────
  - job_name: "node_exporter_openstack"
    static_configs:
      - targets: ["localhost:9122"]
        labels: { node: "worker1" }
      - targets: ["localhost:9123"]
        labels: { node: "worker2" }
      - targets: ["localhost:9124"]
        labels: { node: "worker3" }
